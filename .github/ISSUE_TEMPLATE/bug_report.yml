name: 🐞 Bug Report
description: "Create a report to help us improve."
body:
  - type: checkboxes
    id: terms
    attributes:
      label: Welcome
      options:
        - label: Yes, I understand that the GitHub action repository is not the repository of golangci-lint itself.
          required: true
        - label: Yes, I've searched similar issues on GitHub and didn't find any.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Description of the problem
      placeholder: Your problem description
    validations:
      required: true

  - type: input
    id: golangci-lint-version
    attributes:
      label: Version of golangci-lint
      placeholder: golangci-lint has version 2.x.x built with go1.x.x from xxxx on xxxx-xx-xx
    validations:
      required: true

  - type: input
    id: github-action-version
    attributes:
      label: Version of the GitHub Action
      placeholder: v9.2.0
    validations:
      required: true

  - type: textarea
    id: workflow-file
    attributes:
      label: Workflow file
      value: |-
        <details>

        ```yml
        <add your file content here>
        ```

        </details>
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Golangci-lint configuration
      value: |-
        <details>

        ```yml
        <add your file content here>
        ```

        </details>
    validations:
      required: true

  - type: input
    id: go-env
    attributes:
      label: Go version
      placeholder: go1.25.8
    validations:
      required: true

  - type: textarea
    id: code-example
    attributes:
      label: Code example or link to a public repository
      value: |-
        <details>

        ```go
        // add your code here
        ```

        </details>
    validations:
      required: true

  - type: checkboxes
    id: validation
    attributes:
      label: Validation
      options:
        - label: Yes, I've included all the information above (example, version, config, etc.).
          required: true

  - type: checkboxes
    id: supporter
    attributes:
      label: Supporter
      description: If you find golangci-lint valuable, consider [sponsoring the project](https://donate.golangci.org) to help sustain its development. 💛
      options:
        - label: I am a [sponsor/backer](https://donate.golangci.org) of this project.
