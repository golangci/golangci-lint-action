version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"  # Group all updates into a single larger pull request.
  - package-ecosystem: npm
    directory: "/"
    groups:
      dev-dependencies:
        dependency-type: development
      dependencies:
        dependency-type: production
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
